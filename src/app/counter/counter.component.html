<div id="main">
    <h1>COUNTER APP</h1>
    <div id="counter">
        <button (click)="increaseCounter()" id="add">+</button>
        <h1 id="count">{{counter}}</h1>
        <button (click)="decreaseCounter()" id="delete">-</button>
        <button (click)="setDefault()" id="reset">reset</button>

    </div>

</div>
